name: Flutter Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
        
    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore android/app/upload-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
        
    - name: Create key.properties
      run: |
        cat > android/key.properties << 'EOF'
        storePassword=android
        keyPassword=android
        keyAlias=upload
        storeFile=app/upload-keystore.jks
        EOF
        
    - name: Verify keystore exists
      run: |
        ls -la android/app/upload-keystore.jks
        cat android/key.properties
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Analyze code
      run: flutter analyze
      continue-on-error: true
      
    - name: Build APK
      run: flutter build apk --release --verbose
      
    - name: Build App Bundle
      run: flutter build appbundle --release --verbose
      
    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
        name: Release v${{ steps.version.outputs.version }} Build ${{ github.run_number }}
        body: |
          ## 创造与魔法助手 - 自动构建
          
          ### 版本信息
          - 版本号: ${{ steps.version.outputs.version }}
          - 构建号: ${{ github.run_number }}
          - 提交: ${{ github.sha }}
          
          ### 下载说明
          - **czymf-map-vX.X.X-buildN.apk**: 标准APK安装包
          - **czymf-map-vX.X.X-buildN.aab**: Google Play应用包
          
          ### 功能特性
          - 🎨 青绿色主题设计
          - 🗺️ 交互式地图（4559个坐标点）
          - 🍳 食谱系统（157个食谱，支持关键词关联）
          - 📦 物品资料（161条）
          - 🐾 宠物系统（135条）
          - 🏗️ 建筑图纸（144条）
          
          ### 安装方法
          1. 下载 czymf-map-vX.X.X-buildN.apk
          2. 在Android设备上安装
          3. 允许未知来源安装（如需要）
        draft: false
        prerelease: false
        files: |
          build/app/outputs/flutter-apk/app-release.apk
          build/app/outputs/bundle/release/app-release.aab
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk-release
        path: build/app/outputs/flutter-apk/app-release.apk
        
    - name: Upload App Bundle as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aab-release
        path: build/app/outputs/bundle/release/app-release.aab
